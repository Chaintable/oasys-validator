name: "Release artifacts"

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag for manual runs (e.g. v0.8.0-debank-5)"
        required: true
      ref:
        description: "Git ref to build (tag/branch/sha); empty = the dispatched ref"
        required: false
        default: ""

env:
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE: oasys-writer
  DOCKERFILE: Dockerfile.debank
  AWS_REGION: us-east-1

jobs:
  build-and-package:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: [self-hosted, "${{ matrix.arch }}"]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - uses: tibdex/github-app-token@v1
        id: generate-token
        with:
          app_id: ${{ secrets.RELEASE_MANAGER_APP_ID }}
          private_key: ${{ secrets.RELEASE_MANAGER_APP_SECRET }}

      - name: Set env
        run: |
          REVISION="${{ github.event.inputs.version }}"
          [ -z "$REVISION" ] && REVISION=${GITHUB_REF#refs/*/}
          echo "REVISION=$REVISION" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build image and push to ECR
        uses:  docker/build-push-action@v5
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.arch }}-${{ env.REVISION }}
          build-args: ACCESS_TOKEN=${{ steps.generate-token.outputs.token }}
          provenance: false

      - name: Lark Notification
        continue-on-error: true
        run: |
          notiv3 "Blockchain client Oasys Validator image pushed" ${REGISTRY}/${IMAGE}:${REVISION}

  merge-docker-manifest:
    runs-on: [self-hosted, general]
    needs: build-and-package
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Set env
        run: |
          REVISION="${{ github.event.inputs.version }}"
          [ -z "$REVISION" ] && REVISION=${GITHUB_REF#refs/*/}
          echo "REVISION=$REVISION" >> $GITHUB_ENV
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
      - name: Merge manifest
        run: |
          docker buildx imagetools create --tag ${REGISTRY}/${IMAGE}:${REVISION} --tag ${REGISTRY}/${IMAGE}:latest ${REGISTRY}/${IMAGE}:amd64-${REVISION} ${REGISTRY}/${IMAGE}:arm64-${REVISION}
